<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <meta content="#d9ef55" name="theme-color"/>
  <title>Order Confirmed | JMUNZ Merch Factory</title>
  <link href="styles.css" rel="stylesheet"/>
  <link href="assets/favicon.svg" rel="icon" type="image/svg+xml"/>
  <style>
    body {
      overflow-y: auto !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: var(--cream);
      padding: 120px 20px 40px;
      position: relative;
    }
    .factory-grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: linear-gradient(rgba(16, 20, 18, 0.085) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 20, 18, 0.085) 1px, transparent 1px);
      background-size: 42px 42px;
      pointer-events: none;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .success-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 580px;
      background: var(--cream);
      border: 2px solid var(--ink);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 8px 8px 0 var(--ink);
      margin-top: 20px;
      text-align: center;
      animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .success-icon {
      font: 700 3.8rem var(--display);
      color: var(--ink);
      background: var(--acid);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
      transform: rotate(-6deg);
      border: 2px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
    }
    .success-container h1 {
      font: 700 clamp(2rem, 5vw, 2.8rem)/0.9 var(--display);
      letter-spacing: -0.04em;
      margin: 0 0 12px;
      text-transform: uppercase;
      color: var(--ink);
    }
    .success-container p.subtitle {
      font-size: 0.85rem;
      color: rgba(16, 20, 18, 0.8);
      margin: 0 0 32px;
      line-height: 1.5;
      font-weight: 600;
    }
    .order-card {
      border: 2px solid var(--ink);
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
      text-align: left;
      box-shadow: 4px 4px 0 var(--ink);
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink);
      border-bottom: 1px dashed var(--line);
      padding-bottom: 8px;
    }
    .order-row:last-of-type {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }
    .order-row.total {
      font: 700 1.25rem var(--display);
      margin-top: 15px;
      border-top: 2px dashed var(--ink);
      padding-top: 15px;
      border-bottom: none;
    }
    .order-row.total span {
      letter-spacing: 0.05em;
    }
    .order-details-section {
      text-align: left;
      margin-bottom: 30px;
    }
    .order-details-section h3 {
      font: 800 0.72rem var(--ui);
      letter-spacing: 0.12em;
      margin-bottom: 12px;
      color: var(--ink);
      text-transform: uppercase;
    }
    .address-box {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.6;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      color: var(--ink);
    }
    .action-btn {
      height: 60px;
      width: 100%;
      border: 2px solid var(--ink);
      border-radius: 16px;
      background: var(--green);
      color: var(--cream);
      font: 800 0.95rem var(--display);
      letter-spacing: 0.08em;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 4px 4px 0 var(--ink);
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
      text-transform: uppercase;
    }
    .action-btn:hover {
      background: var(--acid);
      color: var(--ink);
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--ink);
    }
    .loader-box {
      padding: 40px 0;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--ink);
    }
    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--line);
      border-top-color: var(--acid);
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
      margin: 0 auto 24px;
    }
    .error-box {
      color: var(--coral);
      padding: 30px 0;
      font-weight: 700;
    }
    .error-box p {
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="factory-grid"></div>
  <canvas aria-hidden="true" id="grain"></canvas>

  <header class="topbar" style="mix-blend-mode: normal;">
    <a aria-label="JMUNZ Merch Factory home" class="factory-logo" href="/">
      <b>13</b>
      <span>JMUNZ<br/>MERCH FACTORY</span>
    </a>
  </header>

  <main class="success-container">
    <!-- Loader Section -->
    <div id="loading-section" class="loader-box">
      <div class="loader-spinner"></div>
      <p>PROCESSING YOUR SECURE PAYMENT...</p>
    </div>

    <!-- Error Section -->
    <div id="error-section" class="error-box" style="display: none;">
      <p id="error-msg">We couldn't confirm your payment status.</p>
      <a class="action-btn" href="/">GO BACK TO STORE</a>
    </div>

    <!-- Success Content Section -->
    <div id="success-content" style="display: none;">
      <div class="success-icon">13</div>
      <h1>ORDER CONFIRMED</h1>
      <p class="subtitle">Thank you for supporting jMunz13! Your order has been placed.</p>
      
      <div class="order-card">
        <div id="order-items-list"></div>
        <div class="order-row total">
          <span>TOTAL PAID</span>
          <span id="order-total-price">$0.00</span>
        </div>
      </div>



      <div style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 25px;">
        Order reference: <span id="order-ref-id" style="font-family: monospace;"></span>
      </div>

      <a class="action-btn" href="/">CONTINUE SHOPPING &rarr;</a>
    </div>
  </main>

  <script>
    // Grain effect
    const canvas = document.getElementById('grain');
    const ctx = canvas.getContext('2d');
    function grain() {
      const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      const img = ctx.createImageData(canvas.width, canvas.height);
      for (let i = 0; i < img.data.length; i += 4) {
        const v = Math.random() * 255;
        img.data[i] = img.data[i+1] = img.data[i+2] = v;
        img.data[i+3] = 20; // grain opacity
      }
      ctx.putImageData(img, 0, 0);
    }
    grain();
    window.addEventListener('resize', grain);

    // Retrieve query parameters
    const urlParams = new URLSearchParams(window.location.search);
    const paypalToken = urlParams.get('token');
    const stripeSessionId = urlParams.get('session_id');

    async function confirmPayment() {
      if (urlParams.get('preview') === 'true') {
        document.getElementById('order-ref-id').textContent = 'stripe_mock_777713';
        document.getElementById('order-total-price').textContent = '$59.98';
        document.getElementById('order-items-list').innerHTML = `
          <div class="order-row">
            <span>1x Shehht Munz (EM) <small style="opacity:0.6;">(L / Black)</small></span>
            <strong>$19.99</strong>
          </div>
          <div class="order-row">
            <span>1x Munz Thirteen Hoodie <small style="opacity:0.6;">(XL / Cream)</small></span>
            <strong>$39.99</strong>
          </div>
        `;

        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('success-content').style.display = 'block';
        return;
      }

      let res;
      try {
        if (paypalToken) {
          res = await fetch('/api/paypal/capture-order', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ paypalOrderId: paypalToken })
          });
        } else if (stripeSessionId) {
          res = await fetch(`/api/stripe/checkout-success?session_id=${stripeSessionId}`);
        } else {
          document.getElementById('loading-section').style.display = 'none';
          document.getElementById('error-section').style.display = 'block';
          document.getElementById('error-msg').textContent = 'No valid transaction token found in the URL.';
          return;
        }

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to verify transaction.');

        // Render details
        const order = data.order;
        document.getElementById('order-ref-id').textContent = order.orderId;
        document.getElementById('order-total-price').textContent = `$${Number(order.amount).toFixed(2)}`;

        const itemsHtml = order.items.map(item => `
          <div class="order-row">
            <span>${item.quantity}x ${item.name} <small style="opacity:0.6;">(${item.size} / ${item.color})</small></span>
            <strong>$${(item.unitPrice * item.quantity).toFixed(2)}</strong>
          </div>
        `).join('');
        document.getElementById('order-items-list').innerHTML = itemsHtml;



        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('success-content').style.display = 'block';

      } catch (err) {
        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('error-section').style.display = 'block';
        document.getElementById('error-msg').textContent = err.message;
      }
    }

    confirmPayment();
  </script>
</body>
</html>
